<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinna Tools</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- 侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">🧡</div>
          <span class="logo-text">Cinna Tools</span>
        </div>
      </div>

      <div class="sidebar-actions">
        <button class="btn-new-chat" id="btnNewChat">
          <span>✨</span> 新建对话
        </button>
      </div>

      <div class="model-section">
        <div class="model-label">当前模型</div>
        <div class="model-name" id="currentModelName">未选择</div>
      </div>

      <div class="sidebar-footer">
        <button class="btn-settings" id="btnSettings">⚙️ 设置</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main id="main">
      <!-- 设置面板 -->
      <div id="settingsPanel" class="settings-panel hidden">
        <div class="settings-header">
          <h2>⚙️ 模型设置</h2>
          <button class="btn-close" id="btnCloseSettings">✕</button>
        </div>
        <div class="settings-body">
          <div class="form-group">
            <label>选择模型</label>
            <select id="modelSelect">
              <option value="">-- 请选择模型 --</option>
            </select>
          </div>

          <div class="form-group hidden" id="customUrlGroup">
            <label>API 地址</label>
            <input type="url" id="customBaseUrl" placeholder="https://api.example.com/v1" />
          </div>

          <div class="form-group hidden" id="customModelGroup">
            <label>模型名称</label>
            <input type="text" id="customModelName" placeholder="如: gpt-4o" />
          </div>

          <div class="form-group">
            <label>API Key</label>
            <div class="apikey-wrapper">
              <input type="password" id="apiKeyInput" placeholder="sk-..." />
              <button class="btn-toggle-pwd" id="btnTogglePwd" title="显示/隐藏">👁</button>
            </div>
          </div>

          <div class="form-group">
            <label>对话名称（可选）</label>
            <input type="text" id="chatNameInput" placeholder="给对话起个名字" />
          </div>

          <button class="btn-primary" id="btnStartChat">🚀 开始聊天</button>
        </div>
      </div>

      <!-- 聊天区域 -->
      <div id="chatArea" class="chat-area">
        <!-- 欢迎页 -->
        <div class="welcome-page" id="welcomePage">
          <div class="welcome-icon">🧡</div>
          <h1>欢迎使用 Cinna Tools</h1>
          <p>选择模型并输入 API Key 开始对话</p>
          <button class="btn-primary" id="btnOpenSettings">⚙️ 前往设置</button>
        </div>

        <!-- 消息列表 -->
        <div class="messages" id="messages" style="display:none;"></div>

        <!-- 输入区 -->
        <div class="input-area" id="inputArea" style="display:none;">
          <div class="input-wrapper">
            <textarea
              id="chatInput"
              placeholder="输入消息..."
              rows="1"
              autofocus
            ></textarea>
            <button class="btn-send" id="btnSend">▲</button>
          </div>
          <div class="input-hint">Enter 发送，Shift+Enter 换行</div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="renderer.js"></script>
</body>
</html>
